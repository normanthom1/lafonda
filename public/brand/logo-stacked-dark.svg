<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 130">
  <defs>
    <style><![CDATA[@import url('https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Dancing+Script:wght@700&family=Lato:wght@300&display=swap');]]></style>
  </defs>
  <rect width="200" height="130" fill="#1B3564"/>
  <!-- Mark -->
  <g transform="translate(75,4) scale(0.5)">
    <path d="M50,2 L58,42 L98,50 L58,58 L50,98 L42,58 L2,50 L42,42 Z" fill="#C4880B"/>
  </g>
  <!-- Ornament rule -->
  <line x1="68" y1="62" x2="92" y2="62" stroke="#C4880B" stroke-width="0.75" opacity="0.35"/>
  <line x1="108" y1="62" x2="132" y2="62" stroke="#C4880B" stroke-width="0.75" opacity="0.35"/>
  <!-- Wordmark -->
  <text x="100" y="84" text-anchor="middle" fill="#FEF3D0">
    <tspan font-family="'Dancing Script', cursive" font-size="26" font-weight="700" font-style="italic">La </tspan>
    <tspan font-family="'Alfa Slab One', serif" font-size="25">FONDA</tspan>
  </text>
  <!-- Tagline -->
  <text x="100" y="100" text-anchor="middle" font-family="Lato, sans-serif" font-size="7.5" font-weight="300" letter-spacing="3" fill="#FEF3D0" fill-opacity="0.55">COLOMBIAN RESTAURANT</text>
  <!-- Bottom ornament -->
  <text x="100" y="118" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#C4880B" opacity="0.65">✦</text>
</svg>
