<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 42">
  <defs>
    <style><![CDATA[@import url('https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Dancing+Script:wght@700&family=Lato:wght@300&display=swap');]]></style>
  </defs>
  <!-- Light background version -->
  <rect width="210" height="42" fill="#FEF3D0"/>
  <!-- Amber accent lines flanking ornament -->
  <line x1="2" y1="4" x2="32" y2="4" stroke="#C4880B" stroke-width="0.75" opacity="0.4"/>
  <text x="100" y="7" text-anchor="middle" font-family="Georgia, serif" font-size="7" fill="#C4880B" opacity="0.65">✦</text>
  <line x1="178" y1="4" x2="208" y2="4" stroke="#C4880B" stroke-width="0.75" opacity="0.4"/>
  <!-- "La FONDA" wordmark -->
  <text x="105" y="28" text-anchor="middle" fill="#1B3564">
    <tspan font-family="'Dancing Script', cursive" font-size="26" font-weight="700" font-style="italic">La </tspan>
    <tspan font-family="'Alfa Slab One', serif" font-size="25">FONDA</tspan>
  </text>
  <!-- Tagline -->
  <text x="105" y="39" text-anchor="middle" font-family="Lato, sans-serif" font-size="7" font-weight="300" letter-spacing="3" fill="#1B3564" fill-opacity="0.5">COLOMBIAN RESTAURANT</text>
</svg>
